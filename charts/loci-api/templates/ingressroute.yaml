# HTTPS route. Traefik terminates TLS with the Cloudflare Origin Certificate
# and forwards to the API over h2c (the server serves Connect/gRPC/gRPC-Web on
# HTTP/2 cleartext), so streaming RPCs and gRPC-web both work.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loci-api
  labels:
    app.kubernetes.io/name: loci-api
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      services:
        - name: loci-api
          port: {{ .Values.service.port }}
          scheme: h2c
  tls:
    secretName: {{ .Values.tlsSecret }}
---
# Redirect any direct-to-origin plaintext (bypassing Cloudflare) to HTTPS.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: loci-https-redirect
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loci-api-redirect
  labels:
    app.kubernetes.io/name: loci-api
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      middlewares:
        - name: loci-https-redirect
      services:
        - name: loci-api
          port: {{ .Values.service.port }}
          scheme: h2c
