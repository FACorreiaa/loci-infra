# Applies the committed SealedSecret manifests under secrets/. The
# sealed-secrets controller decrypts them into real Secrets in the loci
# namespace (ghcr-pull, loci-postgres-credentials, loci-api-secrets,
# loci-origin-cert, loci-backup-s3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loci-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/FACorreiaa/loci-infra.git
    targetRevision: main
    path: secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: loci
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
