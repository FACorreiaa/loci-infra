# Grafana Alloy agent. Multi-source: the chart comes from Grafana's Helm repo,
# the values from this repo (observability/alloy-values.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 0.12.0
      helm:
        releaseName: alloy
        valueFiles:
          - $values/observability/alloy-values.yaml
    - repoURL: git@github.com:FACorreiaa/loci-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
