# App-of-apps root. Apply this once (kubectl apply -f argocd/root-app.yaml)
# after ArgoCD is installed; it then manages everything under argocd/apps/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loci-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # PLACEHOLDER — set to the loci-infra Git remote once pushed.
    repoURL: https://github.com/FACorreiaa/loci-infra.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
